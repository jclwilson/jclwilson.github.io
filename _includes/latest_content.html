<aside class="latest-posts no-print">
        <h1 class="latest-posts__title"><span class="underline">Latest posts</span></h2>
        <ul class="index">
                {% for page in site.posts limit: 10 %}
                        <li class="index__item">
                            <a title="{{ page.title | xml_escape }}" class="post__link" href="{{ page.url | xml_escape }}">{{ page.title }}</a>
                                {% if page.publisher %} for
                                        <cite class="post__publisher">
                                                {% if page.relation %}<a class="post__publisher-link" rel="external" title="Article on {{ page.publisher | xml_escape }}" href="{{ page.relation | xml_escape }}">{% endif %}
                                                        {{ page.publisher }}
                                                {% if page.relation %}</a>{% endif %}
                                        </cite>
                                {% endif %}
                        </li>
                {% endfor %}
        </ul>
</aside>
