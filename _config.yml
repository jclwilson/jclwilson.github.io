title: Jacob Charles Wilson
description: Writing on art, photography, graphic design, and magazines.
url: https://jacobcharleswilson.com
enforce_ssl: jacobcharleswilson.com
author:
    name: Jacob Charles Wilson
    twitter: jclwilson
    email: hello@jacobcharleswilson.com
    picture: assets/img/default.jpg
social:
  name: Jacob Charles Wilson
  links:
    - https://twitter.com/jclwilson
    - https://instagram.com/jclwilson
    - https://github.com/jclwilson
lang: en_GB
permalink: "/:title"
markdown: kramdown

kramdown:
  smart_quotes: ["apos", "apos", "quot", "quot"]

cdn_url: https://s3.eu-west-2.amazonaws.com/jacobcharleswilson.com/

plugins:
- jekyll-seo-tag
- jekyll-redirect-from
- jekyll-sitemap

# Default Post Front Matter
defaults:
  -
    scope:
      path: "" # an empty string here means all files in the project
    values:
      layout: post
      latest_content: false
      creator: Jacob Charles Wilson # An entity primarily responsible for making the resource.
      language: English # A language of the resource.
      rights: # Information about rights held in and over the resource.
