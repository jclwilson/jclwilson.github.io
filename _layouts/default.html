<!DOCTYPE html>
<html lang='en-gb'>
	<head>
		<meta charset="utf-8">
		<meta http-equiv="x-ua-compatible" content="ie=edge">
		<meta name="viewport" content="width=device-width, initial-scale=1"> {% seo %}
		<style>
			{% include reset.css %}
			{% include main.css %}			
		</style>
		{% feed_meta %}
		<meta name="google-site-verification" content="4ITkWbuq-qEuF4KhwbrCo7jhQfUhwZwzbCwCe8C9R3Y" />
	</head>
	<body>
		<header class="header" id="header">
			<h1 class="header__title"><a href="{{ site.url }}">Jacob Charles Wilson</a></h1>
			<h2 class="no-show">Contact</h2>
			<ul class="menu">
				{% if site.email %}
					<li class="menu__link"><a href="mailto:{{ site.email }}">{{ site.email }}</a></li>
				{% endif %}
				{% if site.twitter.username %}
					<li class="menu__link"><a href="http://twitter.com/{{ site.twitter.username }}">{{ site.twitter.username | prepend: '@' }}</a></li>
				{% endif %}
					<li class="menu__link"><a href="/about">About</a></li>
			</ul>
		</header>
		<main class="main">
			{{ content }}
		</main>
		<footer class="footer">
			<nav class="footer__nav">
				<ul class="menu">
					<li class="menu__link">
						<a href="#header">Back to top</a>
					</li>
				</ul>
			</nav>
		</footer>
		<!-- Reframe.js makes container elements responsive -->
		{% include reframe.html %}			
		<script>
			// Reframe matching elements
			reframe(document.querySelectorAll('iframe'))
		</script>
		<script>
			(function(i, s, o, g, r, a, m) {
				i['GoogleAnalyticsObject'] = r;
				i[r] = i[r] || function() {
					(i[r].q = i[r].q || []).push(arguments)
				}, i[r].l = 1 * new Date();
				a = s.createElement(o),
					m = s.getElementsByTagName(o)[0];
				a.async = 1;
				a.src = g;
				m.parentNode.insertBefore(a, m)
			})(window, document, 'script', 'https://www.google-analytics.com/analytics.js', 'ga');

			ga('create', 'UA-23909678-1', 'auto');
			ga('send', 'pageview');
		</script>
	</body>
</html>
